        // Real-time Data Service
        class LiveDataService {
            constructor() {
                this.subscribers = new Map();
                this.priceData = new Map();
                
                MOCK_LIVE_STOCKS.forEach(stock => {
                    this.priceData.set(stock.symbol, { ...stock });
                });
                
                this.startPriceUpdates();
            }
            
            startPriceUpdates() {
                setInterval(() => {
                    this.priceData.forEach((stock, symbol) => {
                        const randomChange = (Math.random() - 0.5) * 0.5;
                        const newPrice = stock.price * (1 + randomChange / 100);
                        const newChange = stock.change + randomChange;
                        
                        this.priceData.set(symbol, {
                            ...stock,
                            price: parseFloat(newPrice.toFixed(2)),
                            change: parseFloat(newChange.toFixed(2))
                        });
                        
                        this.notifySubscribers(symbol);
                    });
                }, 1000);
            }
            
            subscribe(symbol, callback) {
                if (!this.subscribers.has(symbol)) {
                    this.subscribers.set(symbol, []);
                }
                this.subscribers.get(symbol).push(callback);
                
                const data = this.priceData.get(symbol);
                if (data) callback(data);
            }
            
            unsubscribe(symbol, callback) {
                if (this.subscribers.has(symbol)) {
                    const callbacks = this.subscribers.get(symbol);
                    const index = callbacks.indexOf(callback);
                    if (index > -1) callbacks.splice(index, 1);
                }
            }
            
            notifySubscribers(symbol) {
                if (this.subscribers.has(symbol)) {
                    const data = this.priceData.get(symbol);
                    this.subscribers.get(symbol).forEach(callback => callback(data));
                }
            }
            
            getAllStocks() {
                return Array.from(this.priceData.values());
            }
            
            getStock(symbol) {
                return this.priceData.get(symbol);
            }

            addStock(stockData) {
                this.priceData.set(stockData.symbol, stockData);
            }

            async searchStocks(query) {
                if (!query || query.length < 2) return [];
                
                const lowerQuery = query.toLowerCase();
                const localResults = SEARCHABLE_STOCKS
                    .filter(stock => {
                        if (stock.symbol.toLowerCase().includes(lowerQuery)) return true;
                        if (stock.name.toLowerCase().includes(lowerQuery)) return true;
                        if (stock.keywords && stock.keywords.some(kw => kw.includes(lowerQuery))) return true;
                        return false;
                    })
                    .map(stock => ({
                        symbol: stock.symbol,
                        name: stock.name,
                        exchange: stock.exchange,
                        type: 'stock'
                    }));

                return localResults.slice(0, 20);
            }

            async fetchStockQuote(symbol) {
                try {
                    const response = await fetch(
                        `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`,
                        { signal: AbortSignal.timeout(5000) }
                    );
                    
                    if (!response.ok) throw new Error('API Error');
                    
                    const data = await response.json();
                    if (data.chart.error) throw new Error('Stock not found');

                    const quote = data.chart.result[0];
                    const meta = quote.meta;
                    const currentPrice = meta.regularMarketPrice;
                    const previousClose = meta.chartPreviousClose || meta.previousClose;
                    const change = ((currentPrice - previousClose) / previousClose) * 100;

                    const stockData = {
                        symbol: meta.symbol,
                        name: meta.longName || meta.shortName || symbol,
                        price: currentPrice,
                        change: change,
                        dayHigh: meta.regularMarketDayHigh || currentPrice * 1.02,
                        dayLow: meta.regularMarketDayLow || currentPrice * 0.98,
                        volume: quote.indicators?.quote?.[0]?.volume?.[0] || 0,
                        type: 'stock'
                    };

                    this.addStock(stockData);
                    return stockData;
                } catch (error) {
                    const localStock = this.getStock(symbol);
                    if (localStock) return localStock;
                    return null;
                }
            }
        }

        // Watchlist Manager
        class WatchlistManager {
            constructor() {
                this.loadWatchlist();
            }

            loadWatchlist() {
                const saved = localStorage.getItem('tradify_watchlist');
                this.watchlist = saved ? JSON.parse(saved) : [];
            }

            saveWatchlist() {
                localStorage.setItem('tradify_watchlist', JSON.stringify(this.watchlist));
            }

            addStock(stockInfo) {
                if (!this.isInWatchlist(stockInfo.symbol)) {
                    this.watchlist.push({
                        symbol: stockInfo.symbol,
                        name: stockInfo.name,
                        addedAt: Date.now()
                    });
                    this.saveWatchlist();
                    return true;
                }
                return false;
            }

            removeStock(symbol) {
                this.watchlist = this.watchlist.filter(s => s.symbol !== symbol);
                this.saveWatchlist();
            }

            isInWatchlist(symbol) {
                return this.watchlist.some(s => s.symbol === symbol);
            }

            getWatchlist() {
                return this.watchlist;
            }
        }

        // Double Tap Handler Hook
        function useDoubleTap(onDoubleTap, delay = 300) {
            const [lastTap, setLastTap] = useState(0);

            const handleTap = (e) => {
                const now = Date.now();
                if (now - lastTap < delay) {
                    e.preventDefault();
                    onDoubleTap();
                    setLastTap(0);
                } else {
                    setLastTap(now);
                }
            };

            return handleTap;
        }

        // Live Price Display Component
        function LivePrice({ stock, showWatchlistButton, onToggleWatchlist }) {
            const [priceData, setPriceData] = useState(stock);
            const [inWatchlist, setInWatchlist] = useState(false);

            useEffect(() => {
                setInWatchlist(watchlistManager.isInWatchlist(stock.symbol));
                
                const handleUpdate = (data) => {
                    setPriceData(data);
                };

                liveDataService.subscribe(stock.symbol, handleUpdate);
                
                return () => {
                    liveDataService.unsubscribe(stock.symbol, handleUpdate);
                };
            }, [stock.symbol]);

            const isPositive = priceData.change >= 0;

            const handleWatchlistToggle = (e) => {
                e.stopPropagation();
                if (inWatchlist) {
                    watchlistManager.removeStock(stock.symbol);
                } else {
                    watchlistManager.addStock(priceData);
                }
                setInWatchlist(!inWatchlist);
                if (onToggleWatchlist) onToggleWatchlist();
            };

            return (
                <div className="flex justify-between items-center">
                    <div className="flex-1">
                        <div className="font-semibold text-gray-900">{priceData.symbol}</div>
                        <div className="text-sm text-gray-500 truncate">{priceData.name}</div>
                    </div>
                    <div className="flex items-center gap-3">
                        {showWatchlistButton && (
                            <button 
                                onClick={handleWatchlistToggle}
                                className="text-2xl"
                            >
                                {inWatchlist ? '⭐' : '☆'}
                            </button>
                        )}
                        <div className="text-right">
                            <div className="text-lg font-bold text-gray-900">

                            <div className={`text-sm font-semibold ${isPositive ? 'text-green-600' : 'text-red-600'}`}>

                            </div>
                        </div>
                    </div>
                </div>
            );

        // Main Dashboard Screen
        function DashboardScreen({ onStockSelect, onShowLearning }) {

            const [stocks, setStocks] = useState(MOCK_LIVE_STOCKS);

            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const searchTimeoutRef = useRef(null);

            useEffect(() => {
                loadWatchlistStocks();
            }, []);

            const loadWatchlistStocks = () => {
                const watchlistSymbols = watchlistManager.getWatchlist();
                const watchlistStocks = watchlistSymbols.map(item => {
                    return liveDataService.getStock(item.symbol) || {
                        symbol: item.symbol,
                        name: item.name,
                        price: 0,
                        change: 0,
                        dayHigh: 0,
                        dayLow: 0,
                        volume: 0,

            useEffect(() => {

                    clearTimeout(searchTimeoutRef.current);
                }

                if (searchQuery.length < 2) {
                    setSearchResults([]);
                    setIsSearching(false);
                    return;
                }

                setIsSearching(true);
                searchTimeoutRef.current = setTimeout(async () => {
                    const results = await liveDataService.searchStocks(searchQuery);
                    setSearchResults(results);
                    setIsSearching(false);
                }, 500);

                return () => {

                        clearTimeout(searchTimeoutRef.current);
                    }

            }, [searchQuery]);

            const displayStocks = searchQuery.length >= 2

                if (!fullQuote) {
                    fullQuote = {
                        symbol: stockInfo.symbol,
                        name: stockInfo.name,
                        price: 100.00,
                        change: 0.00,
                        dayHigh: 102.00,
                        dayLow: 98.00,
                        volume: 0,
                        type: 'stock',
                        isPlaceholder: true
                    };
                    
                    liveDataService.addStock(fullQuote);
                }
                
                setIsSearching(false);
                onStockSelect(fullQuote);
            };

            return (
                <div className="flex flex-col h-full">
                    <div className="bg-white shadow-sm">
                        <div className="p-4">
                            <h1 className="text-2xl font-bold text-gray-900 mb-1">Tradify</h1>
                            <p className="text-sm text-gray-500">Powered by Zerodha</p>
                        </div>
                        
                        <TradeModeSelector 
                            mode={tradeMode}
                            onChange={setTradeMode}
                            onLearnDayTrade={() => onShowLearning(LEARNING_CONTENT.dayTrade)}
                            onLearnInvest={() => onShowLearning(LEARNING_CONTENT.invest)}
                        />
                        
                        <div className="p-4 pt-3">
                            <div className="relative">
                                <input 
                                    type="text"
                                    placeholder="Search any stock worldwide..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full p-3 pr-10 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                                />
                                {isSearching && (
                                    <div className="absolute right-3 top-3.5">
                                        <div className="loading-spinner"></div>
                                    </div>
                                )}
                            </div>
                            <div className="flex items-center justify-between mt-2">
                                <p className="text-xs text-gray-500">
                                    Try: Apple, Tesla, Reliance, TCS
                                </p>
                                <a 
                                    href="https://zerodha.com/varsity/"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="text-xs text-blue-600 font-semibold"
                                >
                                    📚 Learn Trading
                                </a>
                            </div>
                        </div>

                        {searchQuery.length < 2 && (
                            <div className="flex border-b border-gray-200">
                                <button
                                    onClick={() => setActiveTab('market')}
                                    className={`flex-1 py-3 font-semibold ${
                                        activeTab === 'market'
                                            ? 'text-blue-600 border-b-2 border-blue-600'
                                            : 'text-gray-500'
                                    }`}
                                >
                                    Market
                                </button>
                                <button
                                    onClick={() => {
                                        setActiveTab('watchlist');
                                        loadWatchlistStocks();
                                    }}
                                    className={`flex-1 py-3 font-semibold ${
                                        activeTab === 'watchlist'
                                            ? 'text-blue-600 border-b-2 border-blue-600'
                                            : 'text-gray-500'
                                    }`}
                                >
                                    Watchlist ({watchlistManager.getWatchlist().length})
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="flex-1 overflow-y-auto bg-gray-50">
                        <div className="bg-white mt-2">
                            {isSearching && searchQuery.length >= 2 ? (
                                <div className="p-8 text-center">
                                    <div className="loading-spinner mx-auto mb-3"></div>
                                    <p className="text-gray-500">Searching...</p>
                                </div>
                            ) : displayStocks.length === 0 && searchQuery.length >= 2 ? (
                                <div className="p-8 text-center text-gray-500">
                                    <p>No stocks found for "{searchQuery}"</p>
                                    <p className="text-sm mt-2">Try different keywords</p>
                                </div>
                            ) : displayStocks.length === 0 && activeTab === 'watchlist' ? (
                                <div className="p-8 text-center text-gray-500">
                                    <p className="text-4xl mb-3">⭐</p>
                                    <p>Your watchlist is empty</p>
                                    <p className="text-sm mt-2">Add stocks by clicking the star icon</p>
                                </div>
                            ) : searchQuery.length >= 2 ? (
                                displayStocks.map((stock, idx) => (
                                    <div 
                                        key={idx}
                                        onClick={() => handleStockClick(stock)}
                                        className="border-b border-gray-100 p-4 active:bg-gray-50 cursor-pointer"
                                    >
                                        <div className="flex justify-between items-center">
                                            <div className="flex-1">
                                                <div className="font-semibold text-gray-900">{stock.symbol}</div>
                                                <div className="text-sm text-gray-500 truncate">{stock.name}</div>
                                                {stock.exchange && (
                                                    <div className="text-xs text-gray-400 mt-1">{stock.exchange}</div>
                                                )}
                                            </div>
                                            <div className="text-blue-600 text-xl">→</div>
                                        </div>
                                    </div>
                                ))
                            ) : (
                                displayStocks.map((stock) => (
                                    <div 
                                        key={stock.symbol}
                                        onClick={() => handleStockClick(stock)}
                                        className="border-b border-gray-100 p-4 active:bg-gray-50 cursor-pointer"
                                    >
                                        <LivePrice 
                                            stock={stock} 
                                            showWatchlistButton={true}
                                            onToggleWatchlist={loadWatchlistStocks}
                                        />
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Stock Detail Screen
        function StockDetailScreen({ stock, tradeMode, onBack, onBuy, onSell, onShowLearning }) {
            const [liveStock, setLiveStock] = useState(stock);

            const handleBuyTap = useDoubleTap(() => onShowLearning(LEARNING_CONTENT.buy));
            const handleSellTap = useDoubleTap(() => onShowLearning(LEARNING_CONTENT.sell));

            useEffect(() => {
                const handleUpdate = (data) => setLiveStock(data);
                liveDataService.subscribe(stock.symbol, handleUpdate);
                return () => liveDataService.unsubscribe(stock.symbol, handleUpdate);
            }, [stock.symbol]);

            const isPositive = liveStock.change >= 0;

            return (
                <div className="flex flex-col h-full bg-white">
                    <div className="p-4 border-b border-gray-200">
                        <button onClick={onBack} className="text-blue-600 mb-4 font-semibold">← Back</button>
                        <h2 className="text-2xl font-bold text-gray-900">{liveStock.symbol}</h2>
                        <p className="text-gray-500">{liveStock.name}</p>
                        {liveStock.isPlaceholder && (
                            <p className="text-xs text-orange-600 mt-1">⚠️ Live data unavailable - using estimated price</p>
                        )}
                    </div>

                    <div className="p-4">
                        <div className="text-4xl font-bold text-gray-900 mb-2">
                            ₹{liveStock.price.toFixed(2)}
                        </div>
                        <div className={`text-lg font-semibold ${isPositive ? 'text-green-600' : 'text-red-600'}`}>
                            {isPositive ? '▲' : '▼'} {isPositive ? '+' : ''}{liveStock.change.toFixed(2)}%
                        </div>
                    </div>

                    <div className="px-4 mb-4">
                        <div className="grid grid-cols-3 gap-3">
                            <div className="bg-gray-50 p-3 rounded-xl">
                                <div className="text-xs text-gray-500">High</div>
                                <div className="text-sm font-bold text-gray-900">₹{liveStock.dayHigh.toFixed(2)}</div>
                            </div>
                            <div className="bg-gray-50 p-3 rounded-xl">
                                <div className="text-xs text-gray-500">Low</div>
                                <div className="text-sm font-bold text-gray-900">₹{liveStock.dayLow.toFixed(2)}</div>
                            </div>
                            <div className="bg-gray-50 p-3 rounded-xl">
                                <div className="text-xs text-gray-500">Volume</div>
                                <div className="text-sm font-bold text-gray-900">
                                    {liveStock.volume > 0 ? (liveStock.volume / 1000).toFixed(0) + 'K' : 'N/A'}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1"></div>

                    <div className="p-4 bg-gray-50">
                        <div className="bg-blue-50 border-l-4 border-blue-500 p-3 rounded-lg mb-4">
                            <div className="flex justify-between items-center">
                                <p className="text-sm text-gray-800">
                                    <strong>Mode:</strong> {tradeMode === 'dayTrade' ? 'Day Trade (MIS)' : 'Invest (CNC)'}
                                </p>
                                <button 
                                    onClick={() => onShowLearning(tradeMode === 'dayTrade' ? LEARNING_CONTENT.dayTrade : LEARNING_CONTENT.invest)}
                                    className="text-blue-600 text-sm font-semibold"
                                >
                                    Learn →
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                            <button 
                                onClick={(e) => {
                                    handleBuyTap(e);
                                    onBuy(liveStock);
                                }}
                                className="bg-green-600 text-white py-4 rounded-xl font-bold text-lg"
                            >
                                Buy
                            </button>
                            <button 
                                onClick={(e) => {
                                    handleSellTap(e);
                                    onSell(liveStock);
                                }}
                                className="bg-red-600 text-white py-4 rounded-xl font-bold text-lg"
                            >
                                Sell
                            </button>
                        </div>
                        
                        <p className="text-xs text-gray-500 text-center mt-3 double-tap-hint">
                            💡 Double-tap Buy/Sell to learn
                        </p>
                    </div>
                </div>
            );
        }

        // Order Screen with all order types
        function OrderScreen({ stock, action, tradeMode, onBack, onConfirm, onShowLearning }) {
            const [quantity, setQuantity] = useState(1);
            const [orderType, setOrderType] = useState('market');
            const [productType, setProductType] = useState('regular');
            const [limitPrice, setLimitPrice] = useState(stock.price);
            const [stopLossPrice, setStopLossPrice] = useState(stock.price * 0.98);
            const [targetPrice, setTargetPrice] = useState(stock.price * 1.02);

            // Double tap handlers for all interactive elements
            const handleQuantityTap = useDoubleTap(() => onShowLearning(LEARNING_CONTENT.quantity));
            const handleMarketOrderTap = useDoubleTap(() => onShowLearning(LEARNING_CONTENT.marketOrder));
            const handleLimitOrderTap = useDoubleTap(() => onShowLearning(LEARNING_CONTENT.limitOrder));
            const handleStopLossTap = useDoubleTap(() => onShowLearning(LEARNING_CONTENT.stopLoss));
            const handleRegularTap = useDoubleTap(() => onShowLearning(LEARNING_CONTENT.regularOrder));
            const handleBOTap = useDoubleTap(() => onShowLearning(LEARNING_CONTENT.bracketOrder));
            const handleCOTap = useDoubleTap(() => onShowLearning(LEARNING_CONTENT.coverOrder));
            const handleAMOTap = useDoubleTap(() => onShowLearning(LEARNING_CONTENT.amoOrder));

            const totalCost = quantity * (orderType === 'market' ? stock.price : limitPrice);

            return (
                <div className="flex flex-col h-full bg-white">
                    <div className="p-4 border-b">
                        <button onClick={onBack} className="text-blue-600 mb-4 font-semibold">← Back</button>
                        <h2 className="text-2xl font-bold">{action === 'buy' ? 'Buy' : 'Sell'} {stock.symbol}</h2>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-6">
                        {/* Quantity */}
                        <div>
                            <label className="block text-sm font-semibold mb-2">Quantity</label>
                            <div className="flex items-center gap-3">
                                <button 
                                    onClick={() => setQuantity(Math.max(1, quantity - 1))}
                                    className="w-12 h-12 bg-gray-100 rounded-xl font-bold text-xl"
                                >−</button>
                                <input 
                                    type="number"
                                    value={quantity}
                                    onChange={(e) => setQuantity(Math.max(1, parseInt(e.target.value) || 1))}
                                    onClick={handleQuantityTap}
                                    className="flex-1 text-center text-2xl font-bold p-3 border-2 rounded-xl"
                                />
                                <button 
                                    onClick={() => setQuantity(quantity + 1)}
                                    className="w-12 h-12 bg-gray-100 rounded-xl font-bold text-xl"
                                >+</button>
                            </div>
                        </div>

                        {/* Order Type */}
                        <div>
                            <label className="block text-sm font-semibold mb-2">Order Type</label>
                            <div className="grid grid-cols-3 gap-2">
                                <button
                                    onClick={(e) => {
                                        handleMarketOrderTap(e);
                                        setOrderType('market');
                                    }}
                                    className={`p-3 rounded-xl border-2 text-sm ${
                                        orderType === 'market' ? 'border-green-500 bg-green-50 text-green-700' : 'border-gray-200'
                                    }`}
                                >
                                    <div className="font-bold">Market</div>
                                </button>
                                <button
                                    onClick={(e) => {
                                        handleLimitOrderTap(e);
                                        setOrderType('limit');
                                    }}
                                    className={`p-3 rounded-xl border-2 text-sm ${
                                        orderType === 'limit' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-200'
                                    }`}
                                >
                                    <div className="font-bold">Limit</div>
                                </button>
                                <button
                                    onClick={(e) => {
                                        handleStopLossTap(e);
                                        setOrderType('sl');
                                    }}
                                    className={`p-3 rounded-xl border-2 text-sm ${
                                        orderType === 'sl' ? 'border-orange-500 bg-orange-50 text-orange-700' : 'border-gray-200'
                                    }`}
                                >
                                    <div className="font-bold">SL</div>
                                </button>
                            </div>
                        </div>

                        {/* Product Type */}
                        <div>
                            <label className="block text-sm font-semibold mb-2">Product Type</label>
                            <div className="grid grid-cols-2 gap-2">
                                <button
                                    onClick={(e) => {
                                        handleRegularTap(e);
                                        setProductType('regular');
                                    }}
                                    className={`p-3 rounded-xl border-2 ${
                                        productType === 'regular' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-200'
                                    }`}
                                >
                                    <div className="font-bold">Regular</div>
                                    <div className="text-xs mt-1 opacity-75">Standard order</div>
                                </button>
                                <button
                                    onClick={(e) => {
                                        handleBOTap(e);
                                        setProductType('bo');
                                    }}
                                    className={`p-3 rounded-xl border-2 ${
                                        productType === 'bo' ? 'border-purple-500 bg-purple-50 text-purple-700' : 'border-gray-200'
                                    }`}
                                >
                                    <div className="font-bold">BO</div>
                                    <div className="text-xs mt-1 opacity-75">Bracket Order</div>
                                </button>
                                <button
                                    onClick={(e) => {
                                        handleCOTap(e);
                                        setProductType('co');
                                    }}
                                    className={`p-3 rounded-xl border-2 ${
                                        productType === 'co' ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200'
                                    }`}
                                >
                                    <div className="font-bold">CO</div>
                                    <div className="text-xs mt-1 opacity-75">Cover Order</div>
                                </button>
                                <button
                                    onClick={(e) => {
                                        handleAMOTap(e);
                                        setProductType('amo');
                                    }}
                                    className={`p-3 rounded-xl border-2 ${
                                        productType === 'amo' ? 'border-pink-500 bg-pink-50 text-pink-700' : 'border-gray-200'
                                    }`}
                                >
                                    <div className="font-bold">AMO</div>
                                    <div className="text-xs mt-1 opacity-75">After Market</div>
                                </button>
                            </div>
                        </div>

                        {/* Limit Price */}
                        {(orderType === 'limit' || orderType === 'sl') && (
                            <div>
                                <label className="block text-sm font-semibold mb-2">
                                    {orderType === 'limit' ? 'Limit Price' : 'Trigger Price'}
                                </label>
                                <input 
                                    type="number"
                                    value={limitPrice}
                                    onChange={(e) => setLimitPrice(parseFloat(e.target.value))}
                                    className="w-full p-3 text-lg border-2 rounded-xl"
                                    step="0.05"
                                />
                            </div>
                        )}

                        {/* Bracket Order Fields */}
                        {productType === 'bo' && (
                            <>
                                <div>
                                    <label className="block text-sm font-semibold mb-2">Target Price</label>
                                    <input 
                                        type="number"
                                        value={targetPrice}
                                        onChange={(e) => setTargetPrice(parseFloat(e.target.value))}
                                        className="w-full p-3 text-lg border-2 rounded-xl"
                                        step="0.05"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold mb-2">Stop Loss Price</label>
                                    <input 
                                        type="number"
                                        value={stopLossPrice}
                                        onChange={(e) => setStopLossPrice(parseFloat(e.target.value))}
                                        className="w-full p-3 text-lg border-2 rounded-xl"
                                        step="0.05"
                                    />
                                </div>
                            </>
                        )}

                        {/* Cover Order Stop Loss */}
                        {productType === 'co' && (
                            <div>
                                <label className="block text-sm font-semibold mb-2">Stop Loss (Required)</label>
                                <input 
                                    type="number"
                                    value={stopLossPrice}
                                    onChange={(e) => setStopLossPrice(parseFloat(e.target.value))}
                                    className="w-full p-3 text-lg border-2 rounded-xl"
                                    step="0.05"
                                />
                            </div>
                        )}

                        {/* Total Cost */}
                        <div className="bg-gray-50 p-4 rounded-xl">
                            <div className="flex justify-between mb-2">
                                <span className="text-gray-600">Total</span>
                                <span className="font-bold text-xl">₹{totalCost.toFixed(2)}</span>
                            </div>
                            {productType === 'bo' && (
                                <div className="text-xs text-gray-500 mt-2 space-y-1">
                                    <div>Target Profit: ₹{((targetPrice - stock.price) * quantity).toFixed(2)}</div>
                                    <div>Max Loss: ₹{((stock.price - stopLossPrice) * quantity).toFixed(2)}</div>
                                </div>
                            )}
                        </div>

                        <div className="bg-yellow-50 border-l-4 border-yellow-500 p-3 rounded">
                            <p className="text-xs text-gray-700">
                                💡 <strong>Tip:</strong> Double-tap any button to learn what it means
                            </p>
                        </div>
                    </div>

                    <div className="p-4 border-t">
                        <button 
                            onClick={() => onConfirm({ 
                                stock, action, quantity, orderType, productType, 
                                limitPrice, stopLossPrice, targetPrice, totalCost, tradeMode 
                            })}
                            className={`w-full py-4 rounded-xl font-bold text-lg ${
                                action === 'buy' ? 'bg-green-600 text-white' : 'bg-red-600 text-white'
                            }`}
                        >
                            Place Order
                        </button>
                    </div>
                </div>
            );
        }

        // Success Screen
        function OrderSuccessScreen({ order, onClose }) {
            return (
                <div className="flex flex-col h-full bg-white">
                    <div className="flex-1 flex items-center justify-center p-4">
                        <div className="text-center">
                            <div className="text-6xl mb-4">✓</div>
                            <h2 className="text-2xl font-bold mb-2">Order Placed!</h2>
                            <div className="bg-gray-50 p-4 rounded-xl text-left space-y-2 mt-6 max-w-sm">
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Stock</span>
                                    <span className="font-semibold">{order.stock.symbol}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Action</span>
                                    <span className="font-semibold capitalize">{order.action}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Quantity</span>
                                    <span className="font-semibold">{order.quantity}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Order Type</span>
                                    <span className="font-semibold uppercase">{order.orderType}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Product</span>
                                    <span className="font-semibold uppercase">{order.productType}</span>
                                </div>
                                <div className="border-t pt-2 mt-2 flex justify-between">
                                    <span className="text-gray-600 font-semibold">Total</span>
                                    <span className="font-bold text-lg">₹{order.totalCost.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div className="p-4">
                        <button 
                            onClick={onClose}
                            className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold"
                        >
                            Done
                        </button>
                    </div>
                </div>
            );
        }

        // Main App
        function App() {
            const [screen, setScreen] = useState('dashboard');
            const [tradeMode, setTradeMode] = useState('invest');
            const [selectedStock, setSelectedStock] = useState(null);
            const [tradeAction, setTradeAction] = useState(null);
            const [pendingOrder, setPendingOrder] = useState(null);
            const [learningContent, setLearningContent] = useState(null);

            const handleStockSelect = (stock) => {
                setSelectedStock(stock);
                setScreen('stockDetail');
            };

            const handleTrade = (action) => {
                setTradeAction(action);
                setScreen('order');
            };

            const handleOrderReview = (orderDetails) => {
                setPendingOrder(orderDetails);
                setScreen('success');
            };

            const handleOrderComplete = () => {
                setScreen('dashboard');
                setSelectedStock(null);
                setTradeAction(null);
                setPendingOrder(null);
            };

            const renderScreen = () => {
                switch(screen) {
                    case 'dashboard':
                        return <DashboardScreen onStockSelect={handleStockSelect} onShowLearning={setLearningContent} />;
                    case 'stockDetail':
                        return (
                            <StockDetailScreen 
                                stock={selectedStock}
                                tradeMode={tradeMode}
                                onBack={() => setScreen('dashboard')}
                                onBuy={() => handleTrade('buy')}
                                onSell={() => handleTrade('sell')}
                                onShowLearning={setLearningContent}
                            />
                        );
                    case 'order':
                        return (
                            <OrderScreen 
                                stock={selectedStock}
                                action={tradeAction}
                                tradeMode={tradeMode}
                                onBack={() => setScreen('stockDetail')}
                                onConfirm={handleOrderReview}
                                onShowLearning={setLearningContent}
                            />
                        );
                    case 'success':
                        return <OrderSuccessScreen order={pendingOrder} onClose={handleOrderComplete} />;
                    default:
                        return <DashboardScreen onStockSelect={handleStockSelect} onShowLearning={setLearningContent} />;
                }
            };

            return (
                <div className="h-screen flex flex-col max-w-md mx-auto bg-white shadow-2xl">
                    {renderScreen()}
                    {learningContent && (
                        <LearningModal 
                            content={learningContent}
                            onClose={() => setLearningContent(null)}
                        />
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
